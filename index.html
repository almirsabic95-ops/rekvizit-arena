<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekvizit Arena</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --gold: #ffd700; --dark: #1a1a1a; --gray: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login ekran */
        #login-screen { background: #222; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        button { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: black; transition: 0.3s; }
        button:hover { background: #ffcc00; transform: scale(1.02); }

        /* Arena / Lobby ekran */
        #arena-screen { display: none; width: 90%; max-width: 800px; text-align: center; }
        .stats-bar { display: flex; justify-content: space-around; background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--gold); }
        .stat-item { font-size: 1.2rem; }
        .stat-item span { color: var(--gold); font-weight: bold; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        .menu-card { background: #222; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid #444; text-decoration: none; color: white; }
        .menu-card:hover { border-color: var(--gold); background: #2a2a2a; }
        .menu-card h3 { margin: 10px 0 0 0; }
        
        .logout-btn { margin-top: 40px; background: transparent; color: #ff4444; border: 1px solid #ff4444; width: auto; padding: 8px 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--gold);">REKVIZIT ARENA</h2>
        <input type="text" id="usernameInput" placeholder="Korisničko ime">
        <input type="password" id="passwordInput" placeholder="Lozinka">
        <div id="first-login-fields" style="display: none;">
            <input type="text" id="secretKeyInput" placeholder="Tajni ključ (samo prvi put)">
            <input type="text" id="couponInput" placeholder="Kupon kod (opcionalno)">
        </div>
        <button onclick="handleLogin()">PRIDRUŽI SE</button>
        <p id="login-msg" style="color: #ff4444; font-size: 0.8rem; margin-top: 10px;"></p>
    </div>

    <div id="arena-screen">
        <h1 style="margin-bottom: 5px;">Dobrodošao, <span id="display-username" style="color: var(--gold);">Igrač</span>!</h1>
        <div class="stats-bar">
            <div class="stat-item">Zlatnici: <span id="user-coins">0</span> R</div>
            <div class="stat-item">Niz (Streak): <span id="user-streak">0</span></div>
        </div>

        <div class="menu-grid">
            <a href="/kvizovi/vjesala" class="menu-card">
                <div style="font-size: 2rem;">🪢</div>
                <h3>Vješala</h3>
            </a>
            <div class="menu-card" style="opacity: 0.5; cursor: not-allowed;">
                <div style="font-size: 2rem;">❓</div>
                <h3>Učilica (Uskoro)</h3>
            </div>
            </div>

        <button class="logout-btn" onclick="handleLogout()">ODJAVA</button>
    </div>

    <script>
        const socket = io();

        // 1. AUTOMATSKA PROVJERA PRI UCITAVANJU (localStorage Fix)
        window.addEventListener('load', () => {
            const spremljenUser = localStorage.getItem('arena_user');
            const spremljenPass = localStorage.getItem('arena_pass');

            if (spremljenUser && spremljenPass) {
                console.log("🔄 Automatska prijava u tijeku...");
                prijaviKorisnika(spremljenUser, spremljenPass);
            }
        });

        // 2. GLAVNA FUNKCIJA ZA LOGIN
        async function handleLogin() {
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            const secret = document.getElementById('secretKeyInput').value;
            const coupon = document.getElementById('couponInput').value;

            prijaviKorisnika(user, pass, secret, coupon);
        }

        async function prijaviKorisnika(user, pass, secret = "", coupon = "") {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: user, 
                        password: pass, 
                        secretKey: secret, 
                        coupon: coupon 
                    })
                });

                const data = await res.json();

                if (data.success) {
                    // SPREMANJE U LOCALSTORAGE (Da nas ne izbaci nakon kviza)
                    localStorage.setItem('arena_user', user);
                    localStorage.setItem('arena_pass', pass);
                    
                    prikaziLobby(data);
                } else if (data.firstLogin) {
                    document.getElementById('first-login-fields').style.display = 'block';
                    document.getElementById('login-msg').innerText = "Prva prijava? Unesite tajni ključ.";
                } else {
                    document.getElementById('login-msg').innerText = data.message || "Greška pri prijavi.";
                }
            } catch (err) {
                console.error("Greška:", err);
            }
        }

        // 3. PRIKAZ LOBBYJA I PODATAKA
        function prikaziLobby(data) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('arena-screen').style.display = 'block';
            
            // Prikaz podataka s ispravkom nula
            document.getElementById('display-username').innerText = data.username || localStorage.getItem('arena_user');
            document.getElementById('user-coins').innerText = data.coins;
            document.getElementById('user-streak').innerText = data.streak;

            // Socket.io prijava za online listu
            socket.emit('login-success', data.username || localStorage.getItem('arena_user'));
        }

        // 4. ODJAVA
        function handleLogout() {
            localStorage.removeItem('arena_user');
            localStorage.removeItem('arena_pass');
            location.reload();
        }
    </script>
</body>
</html>
