<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekvizit Arena</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .hidden { display: none !important; }
        
        /* LOGIN DIZAJN */
        .login-box { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 2px solid #007bff; box-shadow: 0 0 20px rgba(0, 123, 255, 0.2); }
        .naslov-kviza { color: #00d4ff; font-size: 32px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 280px; outline: none; margin-bottom: 10px; }
        .btn-arena { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-arena:hover { background: #0056b3; }

        /* PROFIL, BEDŽEVI I STREAK */
        .profile-card { background: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 12px; display: inline-block; text-align: center; margin: 20px; min-width: 180px; }
        .main-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #444; }
        .bedz-kontejner { display: flex; justify-content: center; gap: 5px; margin: 8px 0; flex-wrap: wrap; }
        .mini-bedz { background: rgba(0, 212, 255, 0.1); padding: 3px 8px; border-radius: 5px; font-size: 11px; border: 1px solid #00d4ff; color: #00d4ff; font-weight: bold; }
        .streak-vatra { color: #ff4500; font-weight: bold; font-size: 18px; text-shadow: 0 0 8px rgba(255, 69, 0, 0.4); }

        /* KVIZ, SIDEBOARD I CHAT */
        #sideboard { position: fixed; right: 0; top: 0; width: 220px; height: 100vh; background: #161616; border-left: 2px solid #007bff; padding: 15px; overflow-y: auto; }
        #kviz-ekran { background: #121212; padding: 30px; border-radius: 15px; border: 2px solid #333; text-align: center; max-width: 600px; margin: 20px auto; }
        #kviz-tajmer { font-size: 70px; font-weight: bold; color: #28a745; margin: 15px 0; }
        #chat-kontejner { width: 100%; max-width: 600px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; margin: 20px auto; display: flex; flex-direction: column; }
        #chat-poruke { height: 200px; overflow-y: auto; padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        
        /* BANNER */
        .promo-banner { background: linear-gradient(90deg, #ff0000, #990000); color: white; padding: 8px 0; overflow: hidden; border-bottom: 2px solid gold; position: fixed; top: 0; width: 100%; z-index: 100; }
        .marquee { display: inline-block; white-space: nowrap; animation: kretanje 25s linear infinite; font-weight: bold; }
        @keyframes kretanje { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* MODALI */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

    <div id="ucilica-banner" class="promo-banner hidden">
        <div class="marquee">🚀 UČILICA - USKORO DOLAZI U REKVIZIT ARENA! TESTIRAJ ZNANJE I OSVOJI COINSE! 🎓</div>
    </div>

    <div id="login-screen" class="container">
        <div class="login-box">
            <div class="naslov-kviza">Rekvizit Arena</div>
            <input type="text" id="login-nadimak" placeholder="Nadimak" onkeydown="if(event.key==='Enter') document.getElementById('login-lozinka').focus()">
            <input type="password" id="login-lozinka" placeholder="Lozinka" onkeydown="if(event.key==='Enter') pokreniLogin()">
            <button class="btn-arena" onclick="pokreniLogin()">ULAZ U ARENU</button>
            <p style="cursor:pointer; font-size: 12px; color: #888; margin-top: 10px;" onclick="prikaziZaboravljeno()">Zaboravljena lozinka?</p>
        </div>
    </div>

    <div id="modal-prva-prijava" class="modal hidden">
        <div style="background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid #007bff; text-align: center;">
            <h3 style="color: gold;">Dobrodošli! 🛡️</h3>
            <p>Postavite tajnu šifru za oporavak:</p>
            <input type="password" id="input-tajna" placeholder="Tajna šifra..."><br>
            <button class="btn-arena" onclick="spremiTajnuIIdiNaPravila()">POSTAVI</button>
        </div>
    </div>

    <div id="modal-pravila" class="modal hidden">
        <div style="background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid #007bff; text-align: center;">
            <h2 style="color: #00d4ff;">📜 Kodeks Arene</h2>
            <p>Poštuj suigrače i ne varaj!</p>
            <button class="btn-arena" onclick="prihvatiPravilaFinal()">PRIHVAĆAM I ULAZIM</button>
        </div>
    </div>

    <div id="main-menu" class="hidden" style="padding-top: 70px;">
        <div id="sideboard">
            <div style="color:#007bff; font-weight:bold; border-bottom:1px solid #333; margin-bottom:10px;">🟢 ONLINE</div>
            <div id="online-lista" style="font-size: 13px;"></div>
        </div>

        <div class="profile-card">
            <img src="default-avatar.png" class="main-avatar">
            <h3 id="prikaz-nadimka">Igrač</h3>
            <div id="prikaz-bedzeva" class="bedz-kontejner"></div>
            <p style="color: gold; font-weight: bold;">💰 <span id="prikaz-coinsa">0</span> <span id="prikaz-streak" class="streak-vatra"></span></p>
        </div>

        <div id="kviz-ekran">
            <div id="kviz-tajmer">30</div>
            <div id="pitanje-tekst" style="font-size: 20px; min-height: 50px;">Spremi se...</div>
            <input type="text" id="kviz-odgovor" placeholder="Tvoj odgovor..." onkeydown="if(event.key==='Enter') posaljiKvizOdgovor()" disabled>
            <div style="margin-top: 20px;">
                <button class="btn-arena" style="width: auto;" onclick="socket.emit('start_kviz', 'opce')">NORMAL MOD</button>
                <button class="btn-arena" style="width: auto; background: #28a745;" onclick="socket.emit('start_kviz', 'ucilica')">UČILICA 🎓</button>
            </div>
        </div>

        <div id="chat-kontejner">
            <div id="chat-poruke"></div>
            <div style="display:flex; padding:10px;">
                <input type="text" id="chat-input" placeholder="Poruka..." onkeydown="if(event.key==='Enter') posaljiChat()" style="flex:1; margin:0;">
                <button class="btn-arena" style="width:50px; margin:0 0 0 5px;" onclick="posaljiChat()">▶</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let privremeniLogin = {};
        let kvizUTijeku = false;

        function pokreniLogin() {
            const n = document.getElementById('login-nadimak').value;
            const l = document.getElementById('login-lozinka').value;
            if (n && l) {
                privremeniLogin = { nadimak: n, lozinka: l };
                socket.emit('provjera_prijave', privremeniLogin);
            }
        }

        socket.on('odgovor_provjere', (data) => {
            if (data.status === 'novi_korisnik') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('modal-prva-prijava').classList.remove('hidden');
            } else if (data.status === 'postojeci') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('modal-pravila').classList.remove('hidden');
            } else { alert(data.poruka); }
        });

        function spremiTajnuIIdiNaPravila() {
            privremeniLogin.tajna_sifra = document.getElementById('input-tajna').value;
            document.getElementById('modal-prva-prijava').classList.add('hidden');
            document.getElementById('modal-pravila').classList.remove('hidden');
        }

        function prihvatiPravilaFinal() { socket.emit('finalna_prijava', privremeniLogin); }

        socket.on('prijavljen_uspjeh', (u) => {
            document.getElementById('modal-pravila').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('ucilica-banner').classList.remove('hidden');
            document.getElementById('prikaz-nadimka').innerText = u.nadimak;
            document.getElementById('prikaz-coinsa').innerText = u.coinsi;
            
            if(u.bedzevi) document.getElementById('prikaz-bedzeva').innerHTML = u.bedzevi.map(b => `<span class="mini-bedz">${b}</span>`).join('');
            if(u.streak) document.getElementById('prikaz-streak').innerText = `🔥 ${u.streak}`;
        });

        function posaljiKvizOdgovor() {
            const inp = document.getElementById('kviz-odgovor');
            if (inp.value.trim() !== "") {
                socket.emit('slanje_odgovora', inp.value);
                inp.value = "";
            }
        }

        socket.on('novo_pitanje', (data) => {
            kvizUTijeku = true;
            document.getElementById('pitanje-tekst').innerText = data.pitanje;
            document.getElementById('kviz-odgovor').disabled = false;
            document.getElementById('kviz-odgovor').focus();
        });

        socket.on('vrijeme_update', (s) => { document.getElementById('kviz-tajmer').innerText = s; });

        socket.on('kraj_pitanja', (data) => {
            kvizUTijeku = false;
            document.getElementById('kviz-odgovor').disabled = true;
            document.getElementById('pitanje-tekst').innerHTML = `Točan odgovor: <b style="color:#28a745">${data.tocno}</b>`;
        });

        function posaljiChat() {
            const inp = document.getElementById('chat-input');
            if (inp.value.trim() !== "") {
                socket.emit('chat_poruka_slanje', inp.value);
                inp.value = "";
            }
        }

        socket.on('chat_poruka_prijem', (data) => {
            const box = document.getElementById('chat-poruke');
            box.innerHTML += `<div><b>${data.nadimak}:</b> ${data.tekst}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('online_lista_update', (lista) => {
            document.getElementById('online-lista').innerHTML = lista.map(i => `<div>• ${i.nadimak}</div>`).join('');
        });

        function prikaziZaboravljeno() {
            const n = prompt("Nadimak:");
            const t = prompt("Tajna šifra:");
            if(n && t) socket.emit('zahtjev_oporavka', { nadimak: n, tajna: t });
        }

        // Anti-cheat: Detekcija promjene taba
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'hidden' && kvizUTijeku) {
                document.getElementById('kviz-odgovor').disabled = true;
                document.getElementById('kviz-odgovor').placeholder = "BLOKIRAN - Izlaz iz taba!";
            }
        });
    </script>
</body>
</html>
