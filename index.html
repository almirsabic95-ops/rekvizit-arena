<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekvizit Arena</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --accent: #00d4ff; /* Svijetlo plava (Cyan) */
            --bg: #0b0f19;
            --card: #161b2a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LOGIN EKRAN - SVIJETLO PLAVA VERZIJA */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a2a44 0%, #0b0f19 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .login-card {
            background: rgba(22, 27, 42, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            text-align: center;
            width: 340px;
            backdrop-filter: blur(10px);
        }

        .login-card h1 {
            color: var(--accent);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #0b0f19;
            border: 1px solid #2d3748;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        button.main-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button.main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        /* LOBBY EKRAN */
        #arena-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        .sidebar {
            width: 300px;
            background: var(--card);
            border-right: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .main-view {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 700px;
        }

        .stat-box {
            flex: 1;
            background: #1e2538;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 4px solid var(--accent);
        }

        .stat-box small { color: #a0aec0; display: block; margin-bottom: 5px; }
        .stat-box span { font-size: 1.8rem; font-weight: bold; color: var(--accent); }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 700px;
        }

        .game-link {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid #2d3748;
            transition: 0.3s;
            text-align: center;
        }

        .game-link:hover {
            border-color: var(--accent);
            background: #1e2538;
            transform: translateY(-5px);
        }

        /* CHAT */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            background: #0b0f19;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        .chat-line { margin-bottom: 10px; border-bottom: 1px solid #1e2538; padding-bottom: 5px; }
        .chat-name { color: var(--accent); font-weight: bold; margin-right: 5px; }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>REKVIZIT ARENA</h1>
            <input type="text" id="userInput" placeholder="Korisničko ime">
            <input type="password" id="passInput" placeholder="Lozinka">
            
            <div id="firstTimeFields" style="display: none;">
                <input type="text" id="secretInput" placeholder="Tajni ključ">
                <input type="text" id="couponInput" placeholder="Kupon (opcionalno)">
            </div>

            <button class="main-btn" onclick="obaviPrijavu()">Uđi u Arenu</button>
            <p id="errorMsg" style="color: #ff4b4b; font-size: 0.85rem; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="arena-screen">
        <div class="sidebar">
            <h2 style="color: var(--accent); margin-top: 0;">Lobby Chat</h2>
            <div id="chat-container"></div>
            <input type="text" id="msgInput" placeholder="Poruka..." onkeypress="if(event.key==='Enter') posaljiPoruku()">
            <button onclick="odjaviMe()" style="margin-top: 20px; background: none; border: 1px solid #ff4b4b; color: #ff4b4b; cursor: pointer; padding: 10px; border-radius: 5px;">ODJAVA</button>
        </div>

        <div class="main-view">
            <h1 id="welcomeTxt">Dobrodošao!</h1>
            
            <div class="stats-row">
                <div class="stat-box">
                    <small>Zlatnici</small>
                    <span id="user-coins">0</span>
                </div>
                <div class="stat-box">
                    <small>Dnevni Niz</small>
                    <span id="user-streak">0</span>
                </div>
            </div>

            <div class="game-grid">
                <a href="/kvizovi/vjesala" class="game-link">
                    <div style="font-size: 3rem; margin-bottom: 10px;">🪢</div>
                    <h3>VJEŠALA</h3>
                    <p style="color: #a0aec0; font-size: 0.8rem;">Osvoji zlato pogađanjem riječi</p>
                </a>
                <div class="game-link" style="opacity: 0.4; cursor: default;">
                    <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
                    <h3>UČILICA</h3>
                    <p style="color: #a0aec0; font-size: 0.8rem;">Dolazi uskoro...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        // 1. AUTOMATSKA PRIJAVA (localStorage provjera)
        window.addEventListener('load', () => {
            const spremljenU = localStorage.getItem('arena_user');
            const spremljenP = localStorage.getItem('arena_pass');

            if (spremljenU && spremljenP) {
                console.log("🔄 Pronađena sesija, prijavljujem...");
                izvrsiLoginAPI(spremljenU, spremljenP);
            }
        });

        async function obaviPrijavu() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const s = document.getElementById('secretInput').value;
            const c = document.getElementById('couponInput').value;
            izvrsiLoginAPI(u, p, s, c);
        }

        async function izvrsiLoginAPI(u, p, s="", c="") {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, secretKey: s, coupon: c })
                });
                
                const data = await response.json();

                if (data.success) {
                    // PAMTIMO DA NAS NE ODJAVI
                    localStorage.setItem('arena_user', u);
                    localStorage.setItem('arena_pass', p);
                    
                    prikaziLobbyUI(data);
                } else if (data.firstLogin) {
                    document.getElementById('firstTimeFields').style.display = 'block';
                    document.getElementById('errorMsg').innerText = "Potrebna prva registracija.";
                } else {
                    document.getElementById('errorMsg').innerText = data.message || "Neuspješna prijava.";
                }
            } catch (err) {
                console.error("Greška na serveru:", err);
            }
        }

        function prikaziLobbyUI(data) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('arena-screen').style.display = 'flex';
            
            document.getElementById('user-coins').innerText = data.coins;
            document.getElementById('user-streak').innerText = data.streak;
            document.getElementById('welcomeTxt').innerText = `Dobrodošao, ${data.username}!`;
            
            socket.emit('login-success', data.username);
        }

        // CHAT LOGIKA
        function posaljiPoruku() {
            const inp = document.getElementById('msgInput');
