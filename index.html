<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekvizit Arena</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #0b0f19;
            --card: #161b2a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* POPRAVAK BLJESKANJA */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a2a44 0%, #0b0f19 100%);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .login-card {
            background: rgba(22, 27, 42, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            text-align: center;
            width: 340px;
            backdrop-filter: blur(10px);
        }

        .login-card h1 { color: var(--accent); margin-bottom: 30px; font-size: 2rem; }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #0b0f19;
            border: 1px solid #2d3748;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        button.main-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button.main-btn:hover { background: #00b4db; transform: scale(1.02); }

        #arena-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        .sidebar {
            width: 300px;
            background: var(--card);
            border-right: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            border: 1px solid #2d3748;
        }

        .chat-line { margin-bottom: 8px; }
        .chat-name { color: var(--accent); font-weight: bold; }

        .main-view {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
        }

        .stat-box {
            flex: 1;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .stat-box small { color: #a0aec0; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.7rem; }
        .stat-box span { font-size: 1.8rem; font-weight: bold; color: var(--accent); }

        .content-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        .game-link {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid #2d3748;
            text-align: center;
            transition: 0.3s;
        }

        .game-link:hover { border-color: var(--accent); transform: translateY(-5px); }

        .leaderboard-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #2d3748;
        }

        .leaderboard-card h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #2d3748; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #a0aec0; font-size: 0.75rem; padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid #2d3748; font-size: 0.9rem; }
        .rank-1 { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>REKVIZIT ARENA</h1>
            <input type="text" id="userInput" placeholder="Korisničko ime">
            <input type="password" id="passInput" placeholder="Lozinka">
            <div id="firstTimeFields" style="display: none;">
                <input type="text" id="secretInput" placeholder="Tajni ključ">
            </div>
            <button class="main-btn" onclick="obaviPrijavu()">UĐI U ARENU</button>
            <p id="errorMsg" style="color: #ff4b4b; margin-top: 15px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="arena-screen">
        <div class="sidebar">
            <h2 style="color: var(--accent); margin-top: 0;">Lobby Chat</h2>
            <div id="chat-container"></div>
            <input type="text" id="msgInput" placeholder="Napiši poruku..." onkeypress="if(event.key==='Enter') posaljiPoruku()">
            <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:#ff4b4b; background:none; border:1px solid #ff4b4b; padding:8px; border-radius:5px; cursor:pointer;">ODJAVA</button>
        </div>

        <div class="main-view">
            <h1 id="welcomeTxt">Dobrodošao!</h1>
            
            <div class="stats-row">
                <div class="stat-box"><small>Dnevni Niz</small><span id="user-streak">0</span></div>
                <div class="stat-box"><small>Profil Level</small><span id="user-level">0</span></div>
            </div>

            <div class="content-layout">
                <a href="/kvizovi/vjesala" class="game-link">
                    <div style="font-size: 4rem; margin-bottom: 15px;">🪢</div>
                    <h3>VJEŠALA</h3>
                    <p style="color: #a0aec0; font-size: 0.8rem;">Igraj i osvoji V-Levele</p>
                </a>

                <div class="leaderboard-card">
                    <h3>🏆 Top V-Level</h3>
                    <table>
                        <thead><tr><th>IGRAČ</th><th>LEVEL</th><th>RIJEČI</th></tr></thead>
                        <tbody id="l-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        window.addEventListener('load', () => {
            const u = localStorage.getItem('arena_user'), p = localStorage.getItem('arena_pass');
            if (u && p) izvrsiLoginAPI(u, p);
            else document.getElementById('login-screen').style.display = 'flex';
            ucitajLeaderboard();
        });

        async function obaviPrijavu() {
            izvrsiLoginAPI(document.getElementById('userInput').value, document.getElementById('passInput').value, document.getElementById('secretInput').value);
        }

        async function izvrsiLoginAPI(u, p, s="") {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, secretKey: s })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('arena_user', u); localStorage.setItem('arena_pass', p);
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('arena-screen').style.display = 'flex';
                    document.getElementById('user-level').innerText = data.level;
                    document.getElementById('user-streak').innerText = data.streak;
                    document.getElementById('welcomeTxt').innerText = `Dobrodošao, ${data.username}!`;
                    socket.emit('login-success', data.username);
                } else if (data.firstLogin) {
                    document.getElementById('login-screen').style.display = 'flex';
                    document.getElementById('firstTimeFields').style.display = 'block';
                }
            } catch (err) { console.error(err); }
        }

        async function ucitajLeaderboard() {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            document.getElementById('l-body').innerHTML = data.map((u, i) => `
                <tr><td class="${i===0?'rank-1':''}">${u.name}</td><td><b>${u.lvl}</b></td><td>${u.solved}</td></tr>
            `).join('');
        }

        function posaljiPoruku() {
            const inp = document.getElementById('msgInput');
            if (inp.value.trim()) { socket.emit('send-msg', inp.value); inp.value = ''; }
        }

        socket.on('receive-msg', (data) => {
            const chat = document.getElementById('chat-container');
            chat.innerHTML += `<div class="chat-line"><span class="chat-name">${data.user}:</span> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
