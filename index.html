<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Rekvizit Arena</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        .main-container { display: flex; width: 95%; height: 90vh; gap: 15px; }
        
        /* Sekcije */
        .side-panel { width: 200px; background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .center-panel { flex: 2; background: #1e1e1e; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; }
        
        /* Online statusi */
        .user-item { margin: 5px 0; font-size: 0.9rem; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #27ae60; }
        .away { background: #f1c40f; }

        /* Kviz gumbi */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-active { background: #27ae60; color: white; }
        .btn-locked { background: #444; color: #888; cursor: not-allowed; }

        /* Chat */
        #chat-box { flex: 1; overflow-y: auto; background: #111; padding: 10px; margin: 10px 0; border-radius: 5px; }
        
        /* Radio prostor */
        #radio-space { margin-top: 20px; border: 1px dashed #555; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen" class="arena-box" style="width: 350px; background: #1e1e1e; padding: 30px; border-radius: 10px; text-align:center;">
    <h2>Rekvizit Arena</h2>
    <input type="text" id="user" placeholder="Nadimak" style="width:100%; margin: 10px 0; padding: 10px;">
    <input type="password" id="pass" placeholder="Lozinka" style="width:100%; margin: 10px 0; padding: 10px;">
    
    <div id="secret-area" class="hidden">
        <input type="text" id="skey" placeholder="Tajna šifra (zaštita)" style="width:100%; margin: 5px 0; padding: 10px;">
        <p style="font-size: 0.8rem; color: #f39c12; margin: 5px 0;">Da li imaš kupon za nagradu?</p>
        <input type="text" id="coupon" placeholder="Kod kupona" style="width:100%; margin: 5px 0; padding: 10px;">
    </div>
    
    <button onclick="login()" style="width:100%; background: #f39c12; color:white; margin-top:15px;">Ulaz u Arenu</button>
</div>

<div id="lobby-screen" class="main-container hidden">
    <div class="side-panel">
        <h4>Online Igrači</h4>
        <div id="online-list"></div>
        
        <div id="radio-space">
            <p style="font-size: 0.8rem;">Radio Stanice</p>
            <button disabled style="font-size: 0.7rem;">Uskoro Play</button>
        </div>
    </div>

    <div class="center-panel">
        <h2 id="greet">Dobrodošli!</h2>
        <div id="chat-box"></div>
        <input type="text" id="chat-in" placeholder="Poruka u lobby..." style="background:#333; color:white; border:none; padding:10px;">
        
        <div class="grid">
            <button class="btn-active" onclick="location.href='/kvizovi/vjesala'">Vješala</button>
            <button class="btn-locked">Učilica (Uskoro)</button>
            <button class="btn-locked">Potjera (Uskoro)</button>
            <button class="btn-locked">Milijunaš (Uskoro)</button>
        </div>
    </div>

    <div class="side-panel">
        <h4>Moj Profil</h4>
        <p>💰 Coins: <span id="p-coins">0</span></p>
        <hr>
        <div id="p-stats">
            <p style="font-size:0.8rem; color:#888;">Nema odigranih kvizova.</p>
        </div>
        <button onclick="logout()" style="background:#c0392b; color:white; width:100%; margin-top:50px;">Odjava</button>
    </div>
</div>

<script>
    const socket = io();
    let myName = "";

    async function login() {
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;
        const secretKey = document.getElementById('skey').value;
        const coupon = document.getElementById('coupon').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password, secretKey: secretKey || null, coupon })
        });

        const data = await res.json();
        if (res.status === 400 && data.firstLogin) {
            document.getElementById('secret-area').classList.remove('hidden');
            alert("Prva prijava! Popunite zaštitu i kupon.");
        } else if (res.ok) {
            myName = username;
            localStorage.setItem('arena_user', username);
            loadLobby(data);
        } else {
            alert(data.message);
        }
    }

    function loadLobby(data) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
        document.getElementById('greet').innerText = `Pozdrav, ${myName}!`;
        document.getElementById('p-coins').innerText = data.coins || 0;
        
        // Dinamička statistika
        if (data.stats && Object.keys(data.stats).length > 0) {
            let html = "";
            for (let kviz in data.stats) {
                html += `<p>${kviz}: ${data.stats[kviz].wins} Pobjeda</p>`;
            }
            document.getElementById('p-stats').innerHTML = html;
        }

        socket.emit('login-success', myName);
    }

    // Chat logika
    document.getElementById('chat-in').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            socket.emit('send-msg', e.target.value);
            e.target.value = "";
        }
    });

    socket.on('receive-msg', (data) => {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div><b>${data.user}:</b> ${data.text}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    socket.on('update-online-list', (users) => {
        let html = "";
        for (let u in users) {
            let dotClass = users[u].status === 'online' ? 'online' : 'away';
            html += `<div class="user-item"><span class="dot ${dotClass}"></span>${u}</div>`;
        }
        document.getElementById('online-list').innerHTML = html;
    });

    // Detekcija "Odsutan" statusa
    document.addEventListener('visibilitychange', () => {
        socket.emit('change-status', document.hidden ? 'away' : 'online');
    });

    function logout() {
        localStorage.removeItem('arena_user');
        location.reload();
    }
</script>
</body>
</html>
