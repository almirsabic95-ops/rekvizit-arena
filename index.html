<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Rekvizit Arena - Ulaz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .arena-box { background: #2a2a2a; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #f39c12; color: white; font-weight: bold; cursor: pointer; }
        .link { color: #f39c12; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="arena-box" id="login-form">
    <h2>Rekvizit Arena</h2>
    <input type="text" id="username" placeholder="Nadimak" required>
    <input type="password" id="password" placeholder="Lozinka" required>
    <div id="first-login-section" class="hidden">
        <input type="text" id="secretKey" placeholder="Unesite tajnu šifru (prva prijava)">
    </div>
    <button onclick="handleLogin()">Ulaz u Arenu</button>
    <div class="link" onclick="showResetForm()">Zaboravljena lozinka?</div>
</div>

<div class="arena-box hidden" id="reset-form">
    <h2>Reset Lozinke</h2>
    <input type="text" id="reset-username" placeholder="Nadimak">
    <input type="text" id="reset-secret" placeholder="Tajna šifra">
    <select id="reset-reason">
        <option value="forgot">Zaboravljena lozinka</option>
        <option value="hack">Sumnja na krađu profila</option>
        <option value="other">Ostalo</option>
    </select>
    <input type="password" id="new-password" placeholder="Nova lozinka">
    <button onclick="handleReset()">Promijeni lozinku</button>
    <div class="link" onclick="showLoginForm()">Povratak</div>
</div>

<script>
    async function handleLogin() {
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            secretKey: document.getElementById('secretKey').value || null
        };

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const res = await response.json();
        if (response.status === 400 && res.firstLogin) {
            document.getElementById('first-login-section').classList.remove('hidden');
            alert("Prva prijava! Unesite tajnu šifru za zaštitu profila.");
        } else if (res.success) {
            alert("Dobrodošli u Arenu!");
            // Ovdje ćeš kasnije preusmjeriti na izbor kvizova (Učilica, Vješala itd.) [cite: 2026-02-19]
        } else {
            alert(res.message);
        }
    }

    function showResetForm() {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('reset-form').classList.remove('hidden');
    }

    function showLoginForm() {
        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('login-form').classList.remove('hidden');
    }

    async function handleReset() {
        const data = {
            username: document.getElementById('reset-username').value,
            secretKey: document.getElementById('reset-secret').value,
            newPassword: document.getElementById('new-password').value
        };

        const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const res = await response.json();
        alert(res.message);
        if (res.success) showLoginForm();
    }
</script>

</body>
</html>
